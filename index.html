<script>
  const formA = "https://forms.gle/ub1D8NgBk3JkYSiV6";
  const formB = "https://forms.gle/HZUKCaMve7WvYWNb8";

  // Check if user already assigned
  let assignedForm = localStorage.getItem("survey_group");

  if (!assignedForm) {
    // Assign randomly once
    assignedForm = Math.random() < 0.5 ? formA : formB;
    localStorage.setItem("survey_group", assignedForm);
  }

  // Redirect
  window.location.replace(assignedForm);
</script>
