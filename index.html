<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
</head>
<body>
  <p>Assigning survey group...</p>

  <script>
    const formA = "https://forms.gle/ub1D8NgBk3JkYSiV6";
    const formB = "https://forms.gle/HZUKCaMve7WvYWNb8";

    // Always fresh randomization (NO localStorage)
    const rand = Math.random();
    const group = rand < 0.5 ? "A" : "B";

    console.log("Random:", rand);
    console.log("Group:", group);

    const target = group === "A" ? formA : formB;

    // Small delay so script executes properly
    setTimeout(() => {
      window.location.href = target + "?group=" + group;
    }, 300);
  </script>
</body>
</html>
